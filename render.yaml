services:
  - type: web
    name: skillstack
    env: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NODE_VERSION
        value: 18.17.0
      - key: NODE_ENV
        value: production
